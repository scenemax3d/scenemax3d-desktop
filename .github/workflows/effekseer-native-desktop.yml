name: Effekseer Native Desktop

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/effekseer-native-desktop.yml"
      - "scenemax_designer/native/effekseer_bridge/**"
      - "scenemax_effekseer_runtime/**"
      - "third_party/Effekseer/**"
  pull_request:
    paths:
      - ".github/workflows/effekseer-native-desktop.yml"
      - "scenemax_designer/native/effekseer_bridge/**"
      - "scenemax_effekseer_runtime/**"
      - "third_party/Effekseer/**"

jobs:
  build-native:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            runner: windows-2022
            cmake_args: ""
            output_path: scenemax_effekseer_runtime/assets/native/windows-x86_64/scenemax_effekseer_jni.dll
            verify_task: :scenemax_effekseer_runtime:verifyEffekseerNativeResourcesForCurrentPlatform
          - label: Linux x64
            runner: ubuntu-22.04
            cmake_args: ""
            output_path: scenemax_effekseer_runtime/assets/native/linux-x86_64/libscenemax_effekseer_jni.so
            verify_task: :scenemax_effekseer_runtime:verifyEffekseerNativeResourcesForCurrentPlatform
          - label: macOS Intel
            runner: macos-13
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES=x86_64"
            output_path: scenemax_effekseer_runtime/assets/native/macos-x86_64/libscenemax_effekseer_jni.dylib
            verify_task: :scenemax_effekseer_runtime:verifyEffekseerNativeResourcesForCurrentPlatform
          - label: macOS Apple Silicon
            runner: macos-14
            cmake_args: "-DCMAKE_OSX_ARCHITECTURES=arm64"
            output_path: scenemax_effekseer_runtime/assets/native/macos-aarch64/libscenemax_effekseer_jni.dylib
            verify_task: :scenemax_effekseer_runtime:verifyEffekseerNativeResourcesForCurrentPlatform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Install Linux OpenGL build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev

      - name: Configure native bridge
        shell: bash
        run: |
          cmake -S scenemax_designer/native/effekseer_bridge \
                -B scenemax_designer/native/effekseer_bridge/build-ci \
                -G Ninja \
                -DEFFEKSEER_ROOT="${GITHUB_WORKSPACE}/third_party/Effekseer" \
                ${{ matrix.cmake_args }}

      - name: Build native bridge
        shell: bash
        run: |
          cmake --build scenemax_designer/native/effekseer_bridge/build-ci --config Release

      - name: Verify current platform packaging
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew ${{ matrix.verify_task }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: effekseer-native-${{ runner.os }}-${{ matrix.label }}
          path: ${{ matrix.output_path }}
          if-no-files-found: error
